<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a1a12 0%, #1a3a2a 100%);
      min-height: 100vh;
      padding-bottom: 30px;
    }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6));
      text-align: center;
      padding: 50px 20px;
    }
    .hero h1 { font-size: 2rem; margin-bottom: 12px; }
    .container { max-width: 800px; margin: -30px auto 0; padding: 0 16px; }
    .card {
      background: rgba(255,255,255,0.98);
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    .card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .messages {
      height: 350px;
      overflow-y: auto;
      padding: 16px;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
    }
    .message.user { color: white; align-self: flex-end; }
    .message.bot { background: white; color: #1a1a2e; align-self: flex-start; }
    .chat-input-area {
      padding: 16px;
      background: white;
      display: flex;
      gap: 10px;
    }
    .chat-input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 25px;
      font-size: 1rem;
    }
    .chat-input-area button {
      background: var(--brand-color, #0f2b1d);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: bold;
    }
    .wa-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      text-decoration: none;
      color: white;
      z-index: 100;
    }
    .typing {
      background: white;
      padding: 10px 14px;
      border-radius: 18px;
      align-self: flex-start;
      color: #666;
      font-style: italic;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 24px;
      max-width: 350px;
      width: 90%;
    }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; }
    footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.6); font-size: 0.7rem; }
  </style>
</head>
<body>
  <div class="hero">
    <h1 id="brandName">AI Chatbot</h1>
    <p id="tagline">Powered by Claude AI</p>
  </div>
  <div class="container">
    <div class="card">
      <div class="card-header" id="cardHeader">
        <span>💬</span>
        <div><h3 id="botName">AI Assistant</h3><small>Powered by Claude AI</small></div>
      </div>
      <div class="messages" id="messages">
        <div class="message bot" id="welcomeMsg">Hello! How can I help you today?</div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button id="sendBtn">Send →</button>
      </div>
    </div>
  </div>
  <a href="#" id="whatsappLink" class="wa-float" target="_blank">💬</a>
  <div class="modal" id="leadModal">
    <div class="modal-content">
      <h3>🎁 Get Your Offer</h3>
      <p>Enter your details and we'll contact you</p>
      <input type="text" id="leadName" placeholder="Your name">
      <input type="tel" id="leadPhone" placeholder="WhatsApp number">
      <button id="saveLeadBtn" style="background:#25D366;">Send →</button>
      <button onclick="closeModal()" style="background:#eee; margin-top: 8px;">No thanks</button>
    </div>
  </div>
  <footer><span id="footerText">AI-powered support • 24/7</span></footer>
  
  <script src="client-config.js"></script>
  <script>
    let config = window.CLIENT_CONFIG;
    let userName = null, userPhone = null, messageCount = 0, conversationHistory = [];
    
    document.documentElement.style.setProperty('--brand-color', config.brandColor);
    document.getElementById('brandName').textContent = config.brandName;
    document.getElementById('botName').textContent = config.brandName + ' Assistant';
    document.getElementById('cardHeader').style.background = config.brandColor;
    document.getElementById('welcomeMsg').textContent = `👋 Welcome to ${config.brandName}! How can I help you today?`;
    
    if (config.leadCapture?.whatsappNumber) {
      document.getElementById('whatsappLink').href = `https://wa.me/${config.leadCapture.whatsappNumber}?text=Hi! I'm interested in ${config.brandName}`;
    }
    
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    
    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}`;
      if (isUser) div.style.background = config.brandColor;
      div.innerHTML = text.replace(/\n/g, '<br>');
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      conversationHistory.push({ role: isUser ? 'user' : 'assistant', content: text });
      if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
    }
    
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '🤖 AI is thinking...';
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function hideTyping() { document.getElementById('typing')?.remove(); }
    
    async function sendMessage() {
      const msg = messageInput.value.trim();
      if (!msg) return;
      addMessage(msg, true);
      messageInput.value = '';
      showTyping();
      
      try {
        const response = await fetch('/.netlify/functions/claude-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, userName, userPhone, conversationHistory: conversationHistory.slice(-6), systemPrompt: config.systemPrompt, tier: config.tier, clientId: config.clientId, clientName: config.brandName })
        });
        const data = await response.json();
        hideTyping();
        addMessage(data.reply, false);
        messageCount++;
        if (config.leadCapture?.enabled && messageCount === 3 && !userPhone) {
          document.getElementById('leadModal').style.display = 'flex';
        }
        if (!userName && msg && !msg.match(/hi|hello|hey|hola/i)) {
          const likelyName = msg.split(' ')[0];
          if (likelyName.length > 2 && likelyName.length < 20) userName = likelyName;
        }
      } catch (error) {
        hideTyping();
        addMessage("Click the WhatsApp button below - I'll reply there! 💬", false);
      }
    }
    
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    
    async function saveLead() {
      const name = document.getElementById('leadName').value;
      const phone = document.getElementById('leadPhone').value;
      if (phone) {
        userPhone = phone.replace(/[^0-9]/g, '');
        if (name) userName = name;
        try {
          await fetch(config.leadCapture.dashboardWebhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'bottemplateanythingiwant$#@santymay9' },
            body: JSON.stringify({ clientId: config.clientId, clientName: config.brandName, leadName: userName, leadPhone: userPhone, tier: config.tier, platform: 'website' })
          });
        } catch(e) {}
        const waUrl = `https://wa.me/${userPhone}?text=Hi! I'm interested in ${config.brandName}`;
        window.open(waUrl, '_blank');
        closeModal();
        addMessage("✅ Got your contact! We'll reach out shortly.", false);
      }
    }
    document.getElementById('saveLeadBtn').onclick = saveLead;
    function closeModal() { document.getElementById('leadModal').style.display = 'none'; }
    window.onclick = (e) => { if (e.target === document.getElementById('leadModal')) closeModal(); };
  </script>
</body>
</html>
